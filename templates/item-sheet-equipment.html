<section class="tab {{tabs.equipment.id}} {{tabs.equipment.cssClass}}" id="equipment" data-group="{{tabs.equipment.group}}" data-tab="{{tabs.equipment.id}}">
  <div class="tab-body">
    <div class="grid-col-span-8 grid-tpl-max-auto mb-5">
      <label for="name">{{localize "DCC.Name"}}</label>
      <input id="name" name="name" value="{{document.name}}" placeholder="Name" autocomplete="off" size="25">
    </div>
    <div class="grid-col-span-4 grid-tpl-max-auto">
      <label for="system.quantity">{{localize "DCC.Quantity"}}</label>
      <input type="text" id="system.quantity" name="system.quantity" value="{{system.quantity}}" data-dtype="Number"/>
    </div>

    <div class="grid-col-span-12 grid-tpl-max-auto">
      <label for="system.description.summary">{{localize "DCC.Notes"}}</label>
      <input type="text" id="system.description.summary" name="system.description.summary"
             value="{{system.description.summary}}" data-dtype="String"/>
    </div>

    <div class="box-border grid-col-span-9" title="{{localize 'DCC.DescriptionTooltip'}}">
      <div class="box-title">{{localize "DCC.DescriptionPreview"}}</div>
      <div class="box-inner description">
        {{{descriptionHTML}}}
      </div>
    </div>
    <div class="box-border grid-col-span-3" style="max-height: 127px; overflow: hidden;">
      <div class="box-title">{{localize "DCC.Image"}}</div>
      <div class="p-5">
        <img class="item-img" src="{{document.img}}" data-action="editImage" data-edit="img" title="{{document.name}}" alt="{{document.name}}"/>
      </div>
    </div>

    <div class="box-border grid-col-span-12">
      <div class="box-title">{{localize "DCC.ChargedMagicItem"}}</div>
      <div class="grid-tpl-max-auto-loose p-5">
        <label title="{{localize 'DCC.AttachedSpellHint'}}">{{localize "DCC.AttachedSpell"}}</label>
        {{#if system.spell.name}}
          <div class="attached-spell">
            <img class="icon-filter" src="{{system.spell.img}}" width="22" height="22" alt="{{system.spell.name}}"/>
            <span>{{system.spell.name}}</span>
            <a class="item-control" title="{{localize 'DCC.RemoveAttachedSpell'}}" data-action="removeAttachedSpell"><i class="fas fa-times"></i></a>
          </div>
        {{else}}
          <div class="attached-spell-hint">{{localize "DCC.AttachedSpellHint"}}</div>
        {{/if}}
        <label for="system.charges.value" title="{{localize 'DCC.ChargesHint'}}">{{localize "DCC.Charges"}}</label>
        <div class="charges-inputs" title="{{localize 'DCC.ChargesHint'}}">
          <input type="text" name="system.charges.value" id="system.charges.value"
                 value="{{system.charges.value}}" data-dtype="Number"/>
          /
          <input type="text" name="system.charges.max" id="system.charges.max"
                 value="{{system.charges.max}}" data-dtype="Number"/>
        </div>
        <label for="system.spellCheckOverride" title="{{localize 'DCC.SpellCheckOverrideHint'}}">{{localize "DCC.SpellCheckOverride"}}</label>
        <input type="text" name="system.spellCheckOverride" id="system.spellCheckOverride"
               value="{{system.spellCheckOverride}}" title="{{localize 'DCC.SpellCheckOverrideHint'}}" data-dtype="String"/>
      </div>
    </div>

    {{> systems/dcc/templates/item-sheet-partial-values.html }}

    <img src="systems/dcc/styles/images/SA-4-31-FCI-spots-4-Treasure-skull-magic-sword.webp"
         style="justify-self: center;"
         alt=""
         class="grid-col-span-12 background-art-filter"
         width="248" height="125">
  </div>
</section>
