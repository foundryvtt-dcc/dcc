{{!-- Lay on Hands Manifestation editor (#426) --}}
<div class="tab-body grid-container">
  <div class="grid-col-span-6 grid-tpl-max-auto grid-align-center">
    <label class="grid-tpl-max-auto" for="system.skills.layOnHands.manifestation.value">
      {{localize "DCC.ManifestationValue"}}
    </label>
    <input name="system.skills.layOnHands.manifestation.value"
           id="system.skills.layOnHands.manifestation.value"
           value="{{system.skills.layOnHands.manifestation.value}}" data-dtype="String"/>
  </div>
  <div class="grid-col-span-6 grid-tpl-max-auto grid-align-center">
    <label class="grid-tpl-max-auto" for="system.skills.layOnHands.manifestation.displayInChat">
      {{localize "DCC.DisplayInChat"}}
    </label>
    <input type="checkbox" name="system.skills.layOnHands.manifestation.displayInChat"
           id="system.skills.layOnHands.manifestation.displayInChat"
           {{checked system.skills.layOnHands.manifestation.displayInChat}} data-dtype="Boolean"
           style="height: 17px; margin-left: 5px"/>
  </div>
  <div class="grid-col-span-12">
    <div class="box-title">{{localize "DCC.Manifestation"}}</div>
    <div class="manifestation">
      {{#if editable}}
        <prose-mirror
          name="system.skills.layOnHands.manifestation.description"
          id="system.skills.layOnHands.manifestation.description"
          button="true"
          editable="{{editable}}"
          toggled="false"
          value="{{system.skills.layOnHands.manifestation.description}}">
          {{{manifestationHTML}}}
        </prose-mirror>
      {{else}}
        {{{manifestationHTML}}}
      {{/if}}
    </div>
  </div>
  <footer class="grid-col-span-12 sheet-footer flexrow">
    <button type="submit" class="full-width">
      <i class="fas fa-save"></i> {{localize "DCC.Save"}}
    </button>
  </footer>
</div>
