name: Create GitHub Release

on:
  # Manual fallback: the push trigger's `paths` filter can miss very large
  # pushes (e.g. a 600+ file squash merge via the API doesn't always report
  # version.txt as changed), leaving no release run. Dispatch this then.
  workflow_dispatch:
  push:
    branches:
      - 'main'
    tags-ignore:
      - '**'
    paths:
      - 'version.txt'

jobs:
  create_github_release:
    runs-on: ubuntu-latest
    name: Foundry Release
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: GitHub Release
        id: github-release
        uses: foundryvtt-dcc/foundry-release-action@main
        with:
          actionToken: ${{ secrets.GITHUB_TOKEN }}
          manifestFileName: 'system.json'
